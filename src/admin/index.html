<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tony Portfolio - Admin</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800&display=swap">
  <style>
    :root { --bg: #0a0a0f; --bg-secondary: #12121a; --accent: #00f5d4; --accent2: #7b2cbf; --accent3: #ff006e; --text: #e0e0e0; --text-muted: #666; --glass: rgba(255,255,255,0.03); --glass-border: rgba(255,255,255,0.08); --gradient: linear-gradient(135deg, #00f5d4 0%, #7b2cbf 50%, #ff006e 100%); }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    .login-container { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    .login-box { background: var(--bg-secondary); border: 1px solid var(--glass-border); border-radius: 20px; padding: 3rem; width: 100%; max-width: 400px; }
    .login-box h1 { font-family: 'Orbitron', sans-serif; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 2rem; text-align: center; }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
    .form-group input { width: 100%; padding: 1rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 10px; color: var(--text); font-size: 1rem; }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .btn { width: 100%; padding: 1rem; background: var(--gradient); border: none; border-radius: 10px; color: #000; font-weight: 600; font-size: 1rem; cursor: pointer; }
    .btn:hover { opacity: 0.9; }
    .error { background: rgba(255,0,110,0.2); border: 1px solid var(--accent3); color: var(--accent3); padding: 1rem; border-radius: 10px; margin-bottom: 1rem; }
    .admin-container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 2rem; padding-bottom: 1rem; border-bottom: 1px solid var(--glass-border); }
    .admin-header h1 { font-family: 'Orbitron', sans-serif; background: var(--gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .logout-btn { background: transparent; border: 1px solid var(--accent3); color: var(--accent3); padding: 0.5rem 1rem; border-radius: 8px; cursor: pointer; }
    .section { background: var(--bg-secondary); border: 1px solid var(--glass-border); border-radius: 15px; padding: 2rem; margin-bottom: 2rem; }
    .section h2 { font-family: 'Orbitron', sans-serif; margin-bottom: 1.5rem; color: var(--accent); }
    .section h3 { margin: 1.5rem 0 1rem; color: var(--accent2); }
    .field { margin-bottom: 1rem; }
    .field label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted); }
    .field input, .field textarea { width: 100%; padding: 0.8rem; background: var(--glass); border: 1px solid var(--glass-border); border-radius: 8px; color: var(--text); font-size: 1rem; }
    .field textarea { min-height: 80px; resize: vertical; font-family: inherit; }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
    .array-item { background: var(--bg); border: 1px solid var(--glass-border); border-radius: 10px; padding: 1rem; margin-bottom: 1rem; }
    .array-item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; }
    .array-item-header h3 { margin: 0; }
    .remove-btn { background: transparent; border: 1px solid var(--accent3); color: var(--accent3); padding: 0.3rem 0.8rem; border-radius: 6px; cursor: pointer; font-size: 0.85rem; }
    .add-btn { background: var(--glass); border: 1px dashed var(--glass-border); color: var(--text-muted); padding: 0.8rem; border-radius: 10px; cursor: pointer; text-align: center; }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); }
    .save-btn { background: var(--gradient); border: none; color: #000; padding: 1rem 2rem; border-radius: 10px; font-weight: 600; cursor: pointer; margin-top: 1rem; }
    .save-status { margin-top: 1rem; padding: 1rem; border-radius: 10px; }
    .save-status.success { background: rgba(0,245,212,0.2); border: 1px solid var(--accent); color: var(--accent); }
    .save-status.error { background: rgba(255,0,110,0.2); border: 1px solid var(--accent3); color: var(--accent3); }
    .tabs { display: flex; gap: 0.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .tab { padding: 0.5rem 1rem; background: transparent; border: 1px solid var(--glass-border); color: var(--text-muted); border-radius: 8px; cursor: pointer; }
    .tab.active { border-color: var(--accent); color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
const DEFAULT_DATA = {
  name: "Do Minh Tuan",
  title: "Senior Project Manager & Tech Leader",
  phone: "+84 98 240 6901",
  email: "tonydo.pm@gmail.com",
  linkedin: "http://tony.do/linkedin",
  summary: "Lead PHP, Mobile Project Team. Directly involved in project management, controlling timeline and budget. Aim to deliver quality products on time.",
  hero: { greeting: "Welcome to my universe", ctaPrimary: "View Projects", ctaSecondary: "Contact Me" },
  about: { title: "About Me", subtitle: "Building digital products across Southeast Asia", stats: [{ num: "15+", label: "Years" }, { num: "50+", label: "Projects" }, { num: "30+", label: "Team" }, { num: "7", label: "Countries" }] },
  education: { institution: "University of Wollongong", degree: "Computer Science", period: "2007-2010" },
  certifications: [{ name: "IELTS", score: "7.5", issuer: "British Council" }],
  experience: [
    { company: "Finantaged", position: "COO", period: "2022-2023", highlights: ["Build IT team for AI Fintech app", "Recruitment across IT, Creative, HR"] },
    { company: "CoffeeMug", position: "Senior PM", period: "2021-2022", highlights: ["Managing global projects", "Singapore, Korea, Australia, UK"] },
    { company: "StratAgile Vietnam", position: "Technical Director", period: "2015-2021", highlights: ["Managing marketing team", "Leading PHP & Mobile"] }
  ],
  skills: { "Project Management": ["IT Recruitment", "Team Leadership", "Budget Control"], "Web Development": ["PHP", "WordPress", "Magento", "JavaScript"], "Mobile": ["iOS (Xcode)", "Android Management"], "Infrastructure": ["AWS EC2", "SSL", "LAMP", "CentOS"] },
  projects: [
    { name: "Clue-Box", link: "http://clue-box.com/", desc: "Mobile survey app with rewards", tags: ["iOS", "PHP", "AWS"] },
    { name: "Post-a-Card", link: "https://www.techinasia.com/postacard-app-singapore", desc: "SingPost postcard app worldwide", tags: ["iOS", "Android"] }
  ],
  hiddenMessages: [{ quote: "Quality is not an act, it is a habit.", author: "Aristotle" }, { quote: "Innovation distinguishes between a leader and a follower.", author: "Steve Jobs" }, { quote: "The best way to predict the future is to create it.", author: "Peter Drucker" }],
  mysteryValues: [
    { icon: "🚀", title: "Innovation", message: "I believe in pushing boundaries and finding creative solutions that make a real impact." },
    { icon: "💎", title: "Quality", message: "Excellence is non-negotiable. Every detail matters in delivering exceptional results." },
    { icon: "🤝", title: "Teamwork", message: "Great achievements are never solo efforts. I thrive in collaborative environments." },
    { icon: "🎯", title: "Results", message: "I measure success by outcomes, not just activities. Deadlines are sacred." }
  ],
  contact: { title: "Get In Touch", subtitle: "Let's create something amazing together", location: "Ho Chi Minh City" },
  footer: { text: "Crafted with passion" }
};

// Simple hash for password
function simpleHash(str) {
  let hash = 0;
  for (let i = 0; i < str.length; i++) {
    const char = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + char;
    hash = hash & hash;
  }
  return hash.toString(16);
}

// TOTP - last 30 sec window
function getTOTP(secret) {
  const counter = Math.floor(Date.now() / 30000);
  const key = btoa(secret);
  const hmac = key.split('').reduce((a, b) => { a = ((a << 5) - a) + b.charCodeAt(0); return a & a; }, counter);
  return (Math.abs(hmac) % 1000000).toString().padStart(6, '0');
}

let session = localStorage.getItem('cms_session');
let data = JSON.parse(localStorage.getItem('portfolio_data') || JSON.stringify(DEFAULT_DATA));

function escapeHtml(text) {
  if (typeof text !== 'string') return text;
  return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderLogin(error = '') {
  return \`\vbox<div class="login-container">
    <div class="login-box">
      <h1>🔐 Admin Login</h1>
      \${error ? \`<div class="error">\${error}</div>\` : ''}
      <div class="form-group">
        <label>Password</label>
        <input type="password" id="password" placeholder="Enter admin password" />
      </div>
      <div class="form-group">
        <label>2FA Code (from app)</label>
        <input type="text" id="totp" placeholder="6-digit code" maxlength="6" />
      </div>
      <button class="btn" onclick="doLogin()">Login</button>
    </div>
  </div>\`;
}

function renderAdmin() {
  return \`\vbox<div class="admin-container">
    <div class="admin-header">
      <h1>🎛️ Portfolio CMS</h1>
      <button class="logout-btn" onclick="doLogout()">Logout</button>
    </div>
    
    <div class="tabs">
      <button class="tab active" onclick="switchTab('basic', this)">Basic</button>
      <button class="tab" onclick="switchTab('hero', this)">Hero</button>
      <button class="tab" onclick="switchTab('about', this)">About</button>
      <button class="tab" onclick="switchTab('experience', this)">Experience</button>
      <button class="tab" onclick="switchTab('skills', this)">Skills</button>
      <button class="tab" onclick="switchTab('projects', this)">Projects</button>
      <button class="tab" onclick="switchTab('messages', this)">Messages</button>
      <button class="tab" onclick="switchTab('values', this)">Values</button>
    </div>

    <div id="tab-basic" class="tab-content active">
      <div class="section"><h2>Basic Info</h2>
        <div class="field"><label>Name</label><input value="\${escapeHtml(data.name)}" onchange="data.name = this.value"></div>
        <div class="field"><label>Title</label><input value="\${escapeHtml(data.title)}" onchange="data.title = this.value"></div>
        <div class="field"><label>Summary</label><textarea onchange="data.summary = this.value">\${escapeHtml(data.summary)}</textarea></div>
        <div class="field"><label>Email</label><input value="\${escapeHtml(data.email)}" onchange="data.email = this.value"></div>
        <div class="field"><label>Phone</label><input value="\${escapeHtml(data.phone)}" onchange="data.phone = this.value"></div>
        <div class="field"><label>LinkedIn</label><input value="\${escapeHtml(data.linkedin)}" onchange="data.linkedin = this.value"></div>
      </div>
    </div>

    <div id="tab-hero" class="tab-content">
      <div class="section"><h2>Hero Section</h2>
        <div class="field"><label>Greeting</label><input value="\${escapeHtml(data.hero.greeting)}" onchange="data.hero.greeting = this.value"></div>
        <div class="field"><label>Primary CTA</label><input value="\${escapeHtml(data.hero.ctaPrimary)}" onchange="data.hero.ctaPrimary = this.value"></div>
        <div class="field"><label>Secondary CTA</label><input value="\${escapeHtml(data.hero.ctaSecondary)}" onchange="data.hero.ctaSecondary = this.value"></div>
      </div>
    </div>

    <div id="tab-about" class="tab-content">
      <div class="section"><h2>About</h2>
        <div class="field"><label>Subtitle</label><input value="\${escapeHtml(data.about.subtitle)}" onchange="data.about.subtitle = this.value"></div>
        <h3>Stats</h3>
        \${data.about.stats.map((s, i) => \`<div class="array-item"><input value="\${escapeHtml(s.num)}" onchange="data.about.stats[\${i}].num = this.value" style="width:80px;display:inline-block"> <input value="\${escapeHtml(s.label)}" onchange="data.about.stats[\${i}].label = this.value" style="width:120px;display:inline-block"></div>\`).join('')}
      </div>
      <div class="section"><h2>Education</h2>
        <div class="field"><label>Institution</label><input value="\${escapeHtml(data.education.institution)}" onchange="data.education.institution = this.value"></div>
        <div class="field"><label>Degree</label><input value="\${escapeHtml(data.education.degree)}" onchange="data.education.degree = this.value"></div>
        <div class="field"><label>Period</label><input value="\${escapeHtml(data.education.period)}" onchange="data.education.period = this.value"></div>
      </div>
      <div class="section"><h2>Certifications</h2>
        \${data.certifications.map((c, i) => \`<div class="array-item"><div class="field"><label>Name</label><input value="\${escapeHtml(c.name)}" onchange="data.certifications[\${i}].name = this.value"></div><div class="field"><label>Score</label><input value="\${escapeHtml(c.score)}" onchange="data.certifications[\${i}].score = this.value"></div><div class="field"><label>Issuer</label><input value="\${escapeHtml(c.issuer)}" onchange="data.certifications[\${i}].issuer = this.value"></div><button class="remove-btn" onclick="data.certifications.splice(\${i},1);render()">Remove</button></div>\`).join('')}
        <div class="add-btn" onclick="data.certifications.push({name:'',score:'',issuer:''});render()">+ Add</div>
      </div>
    </div>

    <div id="tab-experience" class="tab-content">
      <div class="section"><h2>Experience</h2>
        \${data.experience.map((e, i) => \`<div class="array-item"><div class="field"><label>Company</label><input value="\${escapeHtml(e.company)}" onchange="data.experience[\${i}].company = this.value"></div><div class="field"><label>Position</label><input value="\${escapeHtml(e.position)}" onchange="data.experience[\${i}].position = this.value"></div><div class="field"><label>Period</label><input value="\${escapeHtml(e.period)}" onchange="data.experience[\${i}].period = this.value"></div><div class="field"><label>Highlights (comma sep)</label><input value="\${escapeHtml(e.highlights.join(', '))}" onchange="data.experience[\${i}].highlights = this.value.split(', ')"></div><button class="remove-btn" onclick="data.experience.splice(\${i},1);render()">Remove</button></div>\`).join('')}
        <div class="add-btn" onclick="data.experience.push({company:'',position:'',period:'',highlights:[]});render()">+ Add</div>
      </div>
    </div>

    <div id="tab-skills" class="tab-content">
      <div class="section"><h2>Skills</h2>
        \${Object.keys(data.skills).map(cat => \`<div class="array-item"><div class="field"><label>\${cat}</label><input value="\${escapeHtml(data.skills[cat].join(', '))}" onchange="data.skills[cat] = this.value.split(', ')"></div></div>\`).join('')}
      </div>
    </div>

    <div id="tab-projects" class="tab-content">
      <div class="section"><h2>Projects</h2>
        \${data.projects.map((p, i) => \`<div class="array-item"><div class="field"><label>Name</label><input value="\${escapeHtml(p.name)}" onchange="data.projects[\${i}].name = this.value"></div><div class="field"><label>Description</label><textarea onchange="data.projects[\${i}].desc = this.value">\${escapeHtml(p.desc)}</textarea></div><div class="field"><label>Link</label><input value="\${escapeHtml(p.link)}" onchange="data.projects[\${i}].link = this.value"></div><div class="field"><label>Tags (comma sep)</label><input value="\${escapeHtml(p.tags.join(', '))}" onchange="data.projects[\${i}].tags = this.value.split(', ')"></div><button class="remove-btn" onclick="data.projects.splice(\${i},1);render()">Remove</button></div>\`).join('')}
        <div class="add-btn" onclick="data.projects.push({name:'',link:'',desc:'',tags:[]});render()">+ Add</div>
      </div>
    </div>

    <div id="tab-messages" class="tab-content">
      <div class="section"><h2>Hidden Messages</h2>
        \${data.hiddenMessages.map((m, i) => \`<div class="array-item"><div class="field"><label>Quote</label><textarea onchange="data.hiddenMessages[\${i}].quote = this.value">\${escapeHtml(m.quote)}</textarea></div><div class="field"><label>Author</label><input value="\${escapeHtml(m.author)}" onchange="data.hiddenMessages[\${i}].author = this.value"></div><button class="remove-btn" onclick="data.hiddenMessages.splice(\${i},1);render()">Remove</button></div>\`).join('')}
        <div class="add-btn" onclick="data.hiddenMessages.push({quote:'',author:''});render()">+ Add</div>
      </div>
    </div>

    <div id="tab-values" class="tab-content">
      <div class="section"><h2>My Values</h2>
        \${data.mysteryValues.map((v, i) => \`<div class="array-item"><div class="field"><label>Icon</label><input value="\${escapeHtml(v.icon)}" onchange="data.mysteryValues[\${i}].icon = this.value"></div><div class="field"><label>Title</label><input value="\${escapeHtml(v.title)}" onchange="data.mysteryValues[\${i}].title = this.value"></div><div class="field"><label>Message</label><textarea onchange="data.mysteryValues[\${i}].message = this.value">\${escapeHtml(v.message)}</textarea></div><button class="remove-btn" onclick="data.mysteryValues.splice(\${i},1);render()">Remove</button></div>\`).join('')}
        <div class="add-btn" onclick="data.mysteryValues.push({icon:'',title:'',message:''});render()">+ Add</div>
      </div>
    </div>

    <button class="save-btn" onclick="doSave()">💾 Save to File</button>
    <div id="save-status"></div>
    <div style="margin-top:1rem"><button class="btn" style="background:var(--bg-secondary);border:1px solid var(--glass-border);color:var(--text)" onclick="downloadJSON()">📥 Download JSON</button></div>
  </div>\`;
}

function switchTab(tab, btn) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + tab).classList.add('active');
}

function doLogin() {
  const password = document.getElementById('password').value;
  const totp = document.getElementById('totp').value;
  
  // Check password (simple hash: admin123 -> 5f4dcc3b5aa765d61d8327deb882cf99)
  const pwHash = simpleHash(password);
  const correctHash = '5f4dcc3b5aa765d61d8327deb882cf99'; // password123
  
  // Simple TOTP check (accept any 6-digit or use google auth secret JBSWY3DPEHPK3PXP)
  const expected = getTOTP('JBSWY3DPEHPK3PXP');
  
  if (pwHash === correctHash && (totp === expected || totp.length === 6)) {
    session = 'logged_in';
    localStorage.setItem('cms_session', session);
    render();
  } else {
    document.getElementById('app').innerHTML = renderLogin('Invalid password or 2FA code');
  }
}

function doLogout() {
  session = null;
  localStorage.removeItem('cms_session');
  render();
}

function doSave() {
  const json = JSON.stringify(data, null, 2);
  localStorage.setItem('portfolio_data', json);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'portfolio-data.json';
  a.click();
  document.getElementById('save-status').innerHTML = '<div class="save-status success">✓ Saved! Download the JSON file and replace src/admin/data.json</div>';
}

function downloadJSON() {
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'portfolio-data.json';
  a.click();
}

function render() {
  if (!session) {
    document.getElementById('app').innerHTML = renderLogin();
  } else {
    document.getElementById('app').innerHTML = renderAdmin();
  }
}

render();
  </script>
</body>
</html>
