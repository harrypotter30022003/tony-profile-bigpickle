<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tony Portfolio - Admin CMS</title>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Orbitron:wght@400;500;600;700;800&display=swap">
  <style>
    :root {
      --bg: #0a0a0f;
      --bg-secondary: #12121a;
      --accent: #00f5d4;
      --accent2: #7b2cbf;
      --accent3: #ff006e;
      --text: #e0e0e0;
      --text-muted: #666;
      --glass: rgba(255,255,255,0.03);
      --glass-border: rgba(255,255,255,0.08);
      --gradient: linear-gradient(135deg, #00f5d4 0%, #7b2cbf 50%, #ff006e 100%);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    .login-box {
      background: var(--bg-secondary);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      padding: 3rem;
      width: 100%;
      max-width: 400px;
    }
    .login-box h1 {
      font-family: 'Orbitron', sans-serif;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 2rem;
      text-align: center;
    }
    .form-group { margin-bottom: 1.5rem; }
    .form-group label { display: block; margin-bottom: 0.5rem; font-weight: 500; }
    .form-group input {
      width: 100%;
      padding: 1rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      color: var(--text);
      font-size: 1rem;
    }
    .form-group input:focus { outline: none; border-color: var(--accent); }
    .btn {
      width: 100%;
      padding: 1rem;
      background: var(--gradient);
      border: none;
      border-radius: 10px;
      color: #000;
      font-weight: 600;
      font-size: 1rem;
      cursor: pointer;
    }
    .btn:hover { opacity: 0.9; }
    .error {
      background: rgba(255,0,110,0.2);
      border: 1px solid var(--accent3);
      color: var(--accent3);
      padding: 1rem;
      border-radius: 10px;
      margin-bottom: 1rem;
    }
    .admin-container { max-width: 1400px; margin: 0 auto; padding: 2rem; }
    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid var(--glass-border);
    }
    .admin-header h1 {
      font-family: 'Orbitron', sans-serif;
      background: var(--gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logout-btn {
      background: transparent;
      border: 1px solid var(--accent3);
      color: var(--accent3);
      padding: 0.5rem 1rem;
      border-radius: 8px;
      cursor: pointer;
    }
    .section {
      background: var(--bg-secondary);
      border: 1px solid var(--glass-border);
      border-radius: 15px;
      padding: 2rem;
      margin-bottom: 2rem;
    }
    .section h2 {
      font-family: 'Orbitron', sans-serif;
      margin-bottom: 1.5rem;
      color: var(--accent);
    }
    .field { margin-bottom: 1rem; }
    .field label { display: block; margin-bottom: 0.5rem; font-weight: 500; color: var(--text-muted); }
    .field input, .field textarea {
      width: 100%;
      padding: 0.8rem;
      background: var(--glass);
      border: 1px solid var(--glass-border);
      border-radius: 8px;
      color: var(--text);
      font-size: 1rem;
    }
    .field textarea { min-height: 100px; resize: vertical; font-family: inherit; }
    .field input:focus, .field textarea:focus { outline: none; border-color: var(--accent); }
    .array-item {
      background: var(--bg);
      border: 1px solid var(--glass-border);
      border-radius: 10px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .array-item-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1rem;
    }
    .array-item-header h3 { font-weight: 600; }
    .remove-btn {
      background: transparent;
      border: 1px solid var(--accent3);
      color: var(--accent3);
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.85rem;
    }
    .add-btn {
      background: var(--glass);
      border: 1px dashed var(--glass-border);
      color: var(--text-muted);
      padding: 0.8rem;
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
    }
    .add-btn:hover { border-color: var(--accent); color: var(--accent); }
    .save-btn {
      background: var(--gradient);
      border: none;
      color: #000;
      padding: 1rem 2rem;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    .save-status { margin-top: 1rem; padding: 1rem; border-radius: 10px; }
    .save-status.success { background: rgba(0,245,212,0.2); border: 1px solid var(--accent); color: var(--accent); }
    .save-status.error { background: rgba(255,0,110,0.2); border: 1px solid var(--accent3); color: var(--accent3); }
    .tabs { display: flex; gap: 1rem; margin-bottom: 2rem; flex-wrap: wrap; }
    .tab {
      padding: 0.5rem 1rem;
      background: transparent;
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      border-radius: 8px;
      cursor: pointer;
    }
    .tab.active { border-color: var(--accent); color: var(--accent); }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .tabs-row { display: flex; gap: 0.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script>
    const API_URL = 'http://localhost:3001/api';
    let session = localStorage.getItem('admin_session');
    let siteData = null;

    function escapeHtml(text) {
      if (typeof text !== 'string') return text;
      return text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    function renderLogin(error = '') {
      return `
        <div class="login-container">
          <div class="login-box">
            <h1>🔐 Admin Login</h1>
            ${error ? `<div class="error">${error}</div>` : ''}
            <div class="form-group">
              <label>Password</label>
              <input type="password" id="password" placeholder="Enter admin password" />
            </div>
            <div class="form-group">
              <label>2FA Code (Google Authenticator)</label>
              <input type="text" id="totp" placeholder="6-digit code" maxlength="6" />
            </div>
            <button class="btn" onclick="doLogin()">Login</button>
            <p style="margin-top:1rem;font-size:0.85rem;color:var(--text-muted);text-align:center">
              Get Google Authenticator app, scan QR in setup, enter code here
            </p>
          </div>
        </div>
      `;
    }

    function renderAdmin() {
      if (!siteData) return '<div class="error">Loading...</div>';
      
      return `
        <div class="admin-container">
          <div class="admin-header">
            <h1>🎛️ Portfolio CMS</h1>
            <button class="logout-btn" onclick="doLogout()">Logout</button>
          </div>
          
          <div class="tabs">
            <button class="tab active" onclick="switchTab('basic', this)">Basic</button>
            <button class="tab" onclick="switchTab('hero', this)">Hero</button>
            <button class="tab" onclick="switchTab('about', this)">About</button>
            <button class="tab" onclick="switchTab('experience', this)">Experience</button>
            <button class="tab" onclick="switchTab('skills', this)">Skills</button>
            <button class="tab" onclick="switchTab('projects', this)">Projects</button>
            <button class="tab" onclick="switchTab('messages', this)">Messages</button>
            <button class="tab" onclick="switchTab('values', this)">Values</button>
            <button class="tab" onclick="switchTab('contact', this)">Contact</button>
          </div>

          <div id="tab-basic" class="tab-content active">
            <div class="section">
              <h2>Basic Information</h2>
              <div class="field"><label>Name</label><input value="${escapeHtml(siteData.name)}" onchange="updateData('name', this.value)"></div>
              <div class="field"><label>Title</label><input value="${escapeHtml(siteData.title)}" onchange="updateData('title', this.value)"></div>
              <div class="field"><label>Summary</label><textarea onchange="updateData('summary', this.value)">${escapeHtml(siteData.summary)}</textarea></div>
              <div class="field"><label>Email</label><input value="${escapeHtml(siteData.email)}" onchange="updateData('email', this.value)"></div>
              <div class="field"><label>Phone</label><input value="${escapeHtml(siteData.phone)}" onchange="updateData('phone', this.value)"></div>
              <div class="field"><label>LinkedIn URL</label><input value="${escapeHtml(siteData.linkedin)}" onchange="updateData('linkedin', this.value)"></div>
            </div>
          </div>

          <div id="tab-hero" class="tab-content">
            <div class="section">
              <h2>Hero Section</h2>
              <div class="field"><label>Greeting</label><input value="${escapeHtml(siteData.hero.greeting)}" onchange="updateData('hero.greeting', this.value)"></div>
              <div class="field"><label>Primary CTA</label><input value="${escapeHtml(siteData.hero.ctaPrimary)}" onchange="updateData('hero.ctaPrimary', this.value)"></div>
              <div class="field"><label>Secondary CTA</label><input value="${escapeHtml(siteData.hero.ctaSecondary)}" onchange="updateData('hero.ctaSecondary', this.value)"></div>
            </div>
          </div>

          <div id="tab-about" class="tab-content">
            <div class="section">
              <h2>About Section</h2>
              <div class="field"><label>Subtitle</label><input value="${escapeHtml(siteData.about.subtitle)}" onchange="updateData('about.subtitle', this.value)"></div>
              <h3 style="margin:1.5rem 0 1rem;color:var(--accent)">Stats</h3>
              ${siteData.about.stats.map((s, i) => `
                <div class="array-item">
                  <div class="array-item-header">
                    <h3>Stat ${i + 1}</h3>
                  </div>
                  <div class="field"><label>Number</label><input value="${escapeHtml(s.num)}" onchange="updateData('about.stats[${i}].num', this.value)"></div>
                  <div class="field"><label>Label</label><input value="${escapeHtml(s.label)}" onchange="updateData('about.stats[${i}].label', this.value)"></div>
                </div>
              `).join('')}
            </div>
            <div class="section">
              <h2>Education</h2>
              <div class="field"><label>Institution</label><input value="${escapeHtml(siteData.education.institution)}" onchange="updateData('education.institution', this.value)"></div>
              <div class="field"><label>Degree</label><input value="${escapeHtml(siteData.education.degree)}" onchange="updateData('education.degree', this.value)"></div>
              <div class="field"><label>Period</label><input value="${escapeHtml(siteData.education.period)}" onchange="updateData('education.period', this.value)"></div>
            </div>
            <div class="section">
              <h2>Certifications</h2>
              ${siteData.certifications.map((c, i) => `
                <div class="array-item">
                  <div class="array-item-header">
                    <h3>Certification ${i + 1}</h3>
                    <button class="remove-btn" onclick="removeItem('certifications', ${i})">Remove</button>
                  </div>
                  <div class="field"><label>Name</label><input value="${escapeHtml(c.name)}" onchange="updateData('certifications[${i}].name', this.value)"></div>
                  <div class="field"><label>Score</label><input value="${escapeHtml(c.score)}" onchange="updateData('certifications[${i}].score', this.value)"></div>
                  <div class="field"><label>Issuer</label><input value="${escapeHtml(c.issuer)}" onchange="updateData('certifications[${i}].issuer', this.value)"></div>
                </div>
              `).join('')}
              <div class="add-btn" onclick="addItem('certifications', {name:'',score:'',issuer:''})">+ Add Certification</div>
            </div>
          </div>

          <div id="tab-experience" class="tab-content">
            <div class="section">
              <h2>Experience</h2>
              ${siteData.experience.map((exp, i) => `
                <div class="array-item">
                  <div class="array-item-header">
                    <h3>${escapeHtml(exp.position)} at ${escapeHtml(exp.company)}</h3>
                    <button class="remove-btn" onclick="removeItem('experience', ${i})">Remove</button>
                  </div>
                  <div class="field"><label>Company</label><input value="${escapeHtml(exp.company)}" onchange="updateData('experience[${i}].company', this.value)"></div>
                  <div class="field"><label>Position</label><input value="${escapeHtml(exp.position)}" onchange="updateData('experience[${i}].position', this.value)"></div>
                  <div class="field"><label>Period</label><input value="${escapeHtml(exp.period)}" onchange="updateData('experience[${i}].period', this.value)"></div>
                  <div class="field"><label>Highlights (comma separated)</label><input value="${escapeHtml(exp.highlights.join(', '))}" onchange="updateData('experience[${i}].highlights', this.value.split(', '))"></div>
                </div>
              `).join('')}
              <div class="add-btn" onclick="addItem('experience', {company:'',position:'',period:'',highlights:['']})">+ Add Experience</div>
            </div>
          </div>

          <div id="tab-skills" class="tab-content">
            <div class="section">
              <h2>Skills by Category</h2>
              ${Object.entries(siteData.skills).map(([category, skills]) => `
                <div class="array-item">
                  <div class="array-item-header"><h3>${category}</h3></div>
                  <div class="field"><label>Skills (comma separated)</label><input value="${escapeHtml(skills.join(', '))}" onchange="updateData('skills.${category}', this.value.split(', '))"></div>
                </div>
              `).join('')}
            </div>
          </div>

          <div id="tab-projects" class="tab-content">
            <div class="section">
              <h2>Projects</h2>
              ${siteData.projects.map((p, i) => `
                <div class="array-item">
                  <div class="array-item-header">
                    <h3>${escapeHtml(p.name)}</h3>
                    <button class="remove-btn" onclick="removeItem('projects', ${i})">Remove</button>
                  </div>
                  <div class="field"><label>Project Name</label><input value="${escapeHtml(p.name)}" onchange="updateData('projects[${i}].name', this.value)"></div>
                  <div class="field"><label>Description</label><textarea onchange="updateData('projects[${i}].desc', this.value)">${escapeHtml(p.desc)}</textarea></div>
                  <div class="field"><label>Link</label><input value="${escapeHtml(p.link)}" onchange="updateData('projects[${i}].link', this.value)"></div>
                  <div class="field"><label>Tags (comma separated)</label><input value="${escapeHtml(p.tags.join(', '))}" onchange="updateData('projects[${i}].tags', this.value.split(', '))"></div>
                </div>
              `).join('')}
              <div class="add-btn" onclick="addItem('projects', {name:'',desc:'',link:'',tags:['']})">+ Add Project</div>
            </div>
          </div>

          <div id="tab-messages" class="tab-content">
            <div class="section">
              <h2>Hidden Wisdom Messages</h2>
              ${siteData.hiddenMessages.map((m, i) => `
                <div class="array-item">
                  <div class="array-item-header">
                    <h3>Message ${i + 1}</h3>
                    <button class="remove-btn" onclick="removeItem('hiddenMessages', ${i})">Remove</button>
                  </div>
                  <div class="field"><label>Quote</label><textarea onchange="updateData('hiddenMessages[${i}].quote', this.value)">${escapeHtml(m.quote)}</textarea></div>
                  <div class="field"><label>Author</label><input value="${escapeHtml(m.author)}" onchange="updateData('hiddenMessages[${i}].author', this.value)"></div>
                </div>
              `).join('')}
              <div class="add-btn" onclick="addItem('hiddenMessages', {quote:'',author:''})">+ Add Message</div>
            </div>
          </div>

          <div id="tab-values" class="tab-content">
            <div class="section">
              <h2>My Values</h2>
              ${siteData.mysteryValues.map((v, i) => `
                <div class="array-item">
                  <div class="array-item-header">
                    <h3>${escapeHtml(v.title)}</h3>
                    <button class="remove-btn" onclick="removeItem('mysteryValues', ${i})">Remove</button>
                  </div>
                  <div class="field"><label>Icon (emoji)</label><input value="${escapeHtml(v.icon)}" onchange="updateData('mysteryValues[${i}].icon', this.value)"></div>
                  <div class="field"><label>Title</label><input value="${escapeHtml(v.title)}" onchange="updateData('mysteryValues[${i}].title', this.value)"></div>
                  <div class="field"><label>Message</label><textarea onchange="updateData('mysteryValues[${i}].message', this.value)">${escapeHtml(v.message)}</textarea></div>
                </div>
              `).join('')}
              <div class="add-btn" onclick="addItem('mysteryValues', {icon:'',title:'',message:''})">+ Add Value</div>
            </div>
          </div>

          <div id="tab-contact" class="tab-content">
            <div class="section">
              <h2>Contact Section</h2>
              <div class="field"><label>Title</label><input value="${escapeHtml(siteData.contact.title)}" onchange="updateData('contact.title', this.value)"></div>
              <div class="field"><label>Subtitle</label><input value="${escapeHtml(siteData.contact.subtitle)}" onchange="updateData('contact.subtitle', this.value)"></div>
              <div class="field"><label>Location</label><input value="${escapeHtml(siteData.contact.location)}" onchange="updateData('contact.location', this.value)"></div>
            </div>
            <div class="section">
              <h2>Footer</h2>
              <div class="field"><label>Footer Text</label><input value="${escapeHtml(siteData.footer.text)}" onchange="updateData('footer.text', this.value)"></div>
            </div>
          </div>

          <button class="save-btn" onclick="saveData()">💾 Save Changes</button>
          <div id="save-status"></div>
        </div>
      `;
    }

    function updateData(path, value) {
      const parts = path.split('.');
      let obj = siteData;
      for (let i = 0; i < parts.length - 1; i++) {
        const p = parts[i].replace(/\[(\d+)\]/g, '[$1]');
        if (p.match(/^\[\d+]$/)) {
          obj = obj[parseInt(p.slice(1, -1))];
        } else {
          obj = obj[p];
        }
      }
      const last = parts[parts.length - 1].replace(/\[(\d+)\]/g, '[$1]');
      if (last.match(/^\[\d+]$/)) {
        obj[parseInt(last.slice(1, -1))] = value;
      } else {
        obj[last] = value;
      }
    }

    function removeItem(array, index) {
      siteData[array].splice(index, 1);
      render();
    }

    function addItem(array, item) {
      siteData[array].push(item);
      render();
    }

    function switchTab(tab, btn) {
      document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    async function doLogin() {
      const password = document.getElementById('password').value;
      const totp = document.getElementById('totp').value;
      
      const response = await fetch(API_URL + '/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password, totp })
      });
      
      if (response.ok) {
        const data = await response.json();
        session = data.session;
        localStorage.setItem('admin_session', session);
        render();
      } else {
        const data = await response.json();
        document.getElementById('app').innerHTML = renderLogin(data.error);
      }
    }

    async function doLogout() {
      await fetch(API_URL + '/logout', {
        method: 'POST',
        headers: { 'Authorization': session }
      });
      session = null;
      localStorage.removeItem('admin_session');
      render();
    }

    async function saveData() {
      const status = document.getElementById('save-status');
      status.innerHTML = '<div class="save-status">Saving...</div>';
      
      const response = await fetch(API_URL + '/data', {
        method: 'PUT',
        headers: { 
          'Authorization': session,
          'Content-Type': 'application/json'
        },
        body: JSON.stringify(siteData)
      });
      
      if (response.ok) {
        status.innerHTML = '<div class="save-status success">✓ Saved successfully!</div>';
      } else {
        status.innerHTML = '<div class="save-status error">✗ Failed to save</div>';
      }
    }

    async function render() {
      const app = document.getElementById('app');
      
      if (!session) {
        app.innerHTML = renderLogin();
        return;
      }
      
      try {
        const response = await fetch(API_URL + '/data', {
          headers: { 'Authorization': session }
        });
        if (response.status === 401) {
          session = null;
          localStorage.removeItem('admin_session');
          render();
          return;
        }
        siteData = await response.json();
        app.innerHTML = renderAdmin();
      } catch (e) {
        app.innerHTML = '<div class="login-container"><div class="error">Cannot connect to admin server. Make sure server is running: node server.js</div></div>';
      }
    }

    render();
  </script>
</body>
</html>
