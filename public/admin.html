<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tony CMS</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:system-ui;background:#0a0a0f;color:#e0e0e0;min-height:100vh;padding:2rem}
.box{background:#12121a;border:1px solid #333;border-radius:10px;padding:1.5rem;margin-bottom:1rem}
input,textarea{width:100%;padding:0.7rem;background:#1a1a2e;border:1px solid #333;color:#fff;border-radius:6px;margin-bottom:0.8rem}
label{display:block;margin-bottom:0.4rem;color:#888;font-size:0.85rem}
button{padding:0.8rem 1.5rem;background:linear-gradient(135deg,#00f5d4,#7b2cbf);border:none;border-radius:6px;color:#000;font-weight:bold;cursor:pointer;margin-right:0.5rem}
.btn-del{background:#ff006e;color:#fff;padding:0.3rem 0.6rem;border:none;border-radius:4px;cursor:pointer}
.btn-add{background:transparent;border:1px dashed #444;color:#666;width:100%;padding:1rem;text-align:center}
.error{background:#3a1a1a;border:1px solid #ff006e;color:#ff006e;padding:1rem;border-radius:8px;margin-bottom:1rem}
.success{background:#1a3a2a;border:1px solid #00f5d4;color:#00f5d4;padding:1rem;border-radius:8px;margin-bottom:1rem}
.nav{display:flex;gap:0.5rem;margin-bottom:1.5rem;flex-wrap:wrap}
.nav button{padding:0.5rem 1rem;font-size:0.85rem;background:#333;color:#888;border:1px solid #333}
.nav button.active{border-color:#00f5d4;color:#00f5d4}
.tab{display:none}.tab.active{display:block}
.item{background:#1a1a2e;border:1px solid #333;border-radius:8px;padding:1rem;margin-bottom:1rem}
h1{color:#00f5d4;margin-bottom:0.5rem}h2{color:#00f5d4;margin:1.5rem 0 1rem;font-size:1.1rem}
</style>
</head>
<body>
<div id="app">Loading...</div>
<script>
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;')}
function hash(s){let h=0;for(let i=0;i<s.length;i++)h=((h<<5)-h)+s.charCodeAt(i);return(h>>>0).toString(16)}

let session = localStorage.getItem('cms_session');
let data = null;

function login(err){
  document.getElementById('app').innerHTML = '<div class="box"><h1>Login</h1>'+(err?'<div class="error">'+err+'</div>':'')+'<label>Password</label><input type="password" id="pw"><button onclick="doLogin()">Login</button></div>';
}

// Login via API (server validates password)
async function doLogin(){
  try {
    var pw = document.getElementById('pw').value;
    var res = await fetch(API_BASE + '/api/login', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({password: pw})
    });
    var result = await res.json();
    if(result.token){
      session = result.token;
      localStorage.setItem('cms_token', result.token);
      loadData();
    } else {
      login('Invalid password');
    }
  } catch(e) {
    login('Error: ' + e.message);
  }
}

function logout(){
  session = null;
  localStorage.removeItem('cms_session');
  login();
}

// Load from API
const API_BASE = typeof window !== 'undefined' && window.location.port === '5190' ? 'http://localhost:3001' : '';

async function loadData(){
  try {
    var res = await fetch(API_BASE + '/api/data');
    data = await res.json();
  } catch(e) {
    data = {name:'',title:'',summary:'',email:'',phone:'',linkedin:'',
      hero:{greeting:''},experience:[],skills:{},projects:[]};
  }
  render();
}

// Read form values into data object
function updateDataFromForm(){
  data.name = document.getElementById('d_name').value;
  data.title = document.getElementById('d_title').value;
  data.summary = document.getElementById('d_summary').value;
  data.email = document.getElementById('d_email').value;
  data.phone = document.getElementById('d_phone').value;
  data.linkedin = document.getElementById('d_linkedin').value;
  data.hero = data.hero || {};
  data.hero.greeting = document.getElementById('d_hero_greeting').value;
  data.hero.ctaPrimary = document.getElementById('d_hero_cta1').value;
  data.hero.ctaSecondary = document.getElementById('d_hero_cta2').value;
  data.skills = data.skills || {};
  data.skills['Project Management'] = (document.getElementById('s_pm').value || '').split(',').map(s => s.trim());
  data.skills['Web Development'] = (document.getElementById('s_web').value || '').split(',').map(s => s.trim());
  data.skills['Mobile'] = (document.getElementById('s_mobile').value || '').split(',').map(s => s.trim());
  data.skills['Infrastructure'] = (document.getElementById('s_infra').value || '').split(',').map(s => s.trim());
}

// Save to API
async function save(){
  try {
    updateDataFromForm();
    console.log('Saving to:', API_BASE + '/api/save');
    console.log('Data keys:', Object.keys(data));
    console.log('Saving name:', data.name);
    var token = localStorage.getItem('cms_token');
var payload = {token: token, data: data};
    console.log('Payload password:', payload.password);
    var res = await fetch(API_BASE + '/api/save', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify(payload)
    });
    var result = await res.json();
    console.log('Result:', result);
    if(result.success){
      document.getElementById('status').innerHTML = '<div class="success">✓ Saved! Refresh page to see updated content.</div>';
    } else {
      document.getElementById('status').innerHTML = '<div class="error">'+result.error+'</div>';
    }
  } catch(e) {
    console.log('Error:', e);
    document.getElementById('status').innerHTML = '<div class="error">Error: '+e.message+'</div>';
  }
}

function switchTab(t){
  document.querySelectorAll('.nav button').forEach(function(b){b.classList.remove('active')});
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')});
  event.target.classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
}

function addExp(){data.experience.push({company:'',position:'',period:''});renderExp();}
function deleteExp(i){data.experience.splice(i,1);renderExp();}
function renderExp(){
  var el = document.getElementById('exp_list');
  var html = '<h2>Experience</h2>';
  for(var i=0; i<data.experience.length; i++){
    var e = data.experience[i];
    html += '<div class="item"><button class="btn-del" onclick="deleteExp('+i+')">X</button>';
    html += '<input placeholder="Company" value="'+esc(e.company)+'" onchange="data.experience['+i+'].company=this.value">';
    html += '<input placeholder="Position" value="'+esc(e.position)+'" onchange="data.experience['+i+'].position=this.value">';
    html += '<input placeholder="Period" value="'+esc(e.period)+'" onchange="data.experience['+i+'].period=this.value"></div>';
  }
  el.innerHTML = html;
}

function addProj(){data.projects.push({name:'',link:'',desc:'',tags:[]});renderProj();}
function deleteProj(i){data.projects.splice(i,1);renderProj();}
function renderProj(){
  var el = document.getElementById('proj_list');
  var html = '<h2>Projects</h2>';
  for(var i=0; i<data.projects.length; i++){
    var p = data.projects[i];
    html += '<div class="item"><button class="btn-del" onclick="deleteProj('+i+')">X</button>';
    html += '<input placeholder="Name" value="'+esc(p.name)+'" onchange="data.projects['+i+'].name=this.value">';
    html += '<textarea placeholder="Description" onchange="data.projects['+i+'].desc=this.value">'+esc(p.desc)+'</textarea>';
    html += '<input placeholder="Link" value="'+esc(p.link)+'" onchange="data.projects['+i+'].link=this.value"></div>';
  }
  el.innerHTML = html;
}

function render(){
  var s = '<h1>CMS <button onclick="logout()" style="background:#333;color:#fff;margin-left:1rem">Logout</button></h1>';
  s += '<div class="nav"><button class="active" onclick="switchTab(\'basic\')"> Basic</button><button onclick="switchTab(\'hero\')">Hero</button><button onclick="switchTab(\'exp\')">Experience</button><button onclick="switchTab(\'skills\')">Skills</button><button onclick="switchTab(\'projects\')">Projects</button></div>';
  
  s += '<div id="tab-basic" class="tab active"><div class="box"><h2>Basic</h2>';
  s += '<label>Name</label><input id="d_name"><label>Title</label><input id="d_title">';
  s += '<label>Summary</label><textarea id="d_summary"></textarea>';
  s += '<label>Email</label><input id="d_email"><label>Phone</label><input id="d_phone">';
  s += '<label>LinkedIn</label><input id="d_linkedin"></div></div>';
  
  s += '<div id="tab-hero" class="tab"><div class="box"><h2>Hero</h2>';
  s += '<label>Greeting</label><input id="d_hero_greeting"><label>Primary CTA</label><input id="d_hero_cta1"><label>Secondary CTA</label><input id="d_hero_cta2"></div></div>';
  
  s += '<div id="tab-exp" class="tab"><div class="box" id="exp_list"><h2>Experience</h2></div>';
  s += '<button class="btn-add" onclick="addExp()">+ Add</button></div>';
  
  s += '<div id="tab-skills" class="tab"><div class="box"><h2>Skills</h2>';
  s += '<label>Project Management</label><input id="s_pm"><label>Web Development</label><input id="s_web">';
  s += '<label>Mobile</label><input id="s_mobile"><label>Infrastructure</label><input id="s_infra"></div></div>';
  
  s += '<div id="tab-projects" class="tab"><div class="box" id="proj_list"><h2>Projects</h2></div>';
  s += '<button class="btn-add" onclick="addProj()">+ Add</button></div>';
  
  s += '<button onclick="save()">Save to Site</button><div id="status"></div>';
  document.getElementById('app').innerHTML = s;
  
  // Fill values from API data
  document.getElementById('d_name').value = data.name||'';
  document.getElementById('d_title').value = data.title||'';
  document.getElementById('d_summary').value = data.summary||'';
  document.getElementById('d_email').value = data.email||'';
  document.getElementById('d_phone').value = data.phone||'';
  document.getElementById('d_linkedin').value = data.linkedin||'';
  document.getElementById('d_hero_greeting').value = (data.hero&&data.hero.greeting)||'';
  document.getElementById('d_hero_cta1').value = (data.hero&&data.hero.ctaPrimary)||'';
  document.getElementById('d_hero_cta2').value = (data.hero&&data.hero.ctaSecondary)||'';
  document.getElementById('s_pm').value = (data.skills&&data.skills['Project Management']||[]).join(', ');
  document.getElementById('s_web').value = (data.skills&&data.skills['Web Development']||[]).join(', ');
  document.getElementById('s_mobile').value = (data.skills&&data.skills['Mobile']||[]).join(', ');
  document.getElementById('s_infra').value = (data.skills&&data.skills['Infrastructure']||[]).join(', ');
  
  renderExp();
  renderProj();
}

if(!session){login();}else{loadData();}
</script>
</body>
</html>
